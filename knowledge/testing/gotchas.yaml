# Cross-Project Gotchas
# Failure patterns learned from test runs. Read before every test session.
# Each entry: symptom, cause, resolution, prevention.
# Last updated: 2026-03-22

id: gotchas
name: "Cross-Project Gotchas"
description: "Failure patterns learned from real test sessions — symptom, cause, resolution, and prevention for each"
pattern: gotchas
category: testing
spec_relevant: false
project_applicability:
  relevant_when: "Always relevant — cross-project failure patterns"
  action_if_irrelevant: keep
last_updated: 2026-03-22

gotchas:
  - id: dom-not-visual
    severity: high
    symptom: "DOM check passes but element is invisible to user"
    cause: "Element has correct text/structure but invisible styling (color==bgcolor, low opacity, display:none, clipped)"
    resolution: "Added computed style verification recipe"
    prevention: "ALWAYS pair DOM assertions (read_page/snapshot) with computed style checks"
    discovered: "FxBadge showed 'fx' text in accessibility tree but was invisible (foreground==background color, opacity 0.15)"
    applies_to: "all projects"

  - id: server-down-false-negatives
    severity: high
    symptom: "Formula cells show Error indicators that look like bugs"
    cause: "Backend API server not running — Vite proxy returns 500/502"
    resolution: "Added prerequisites health check recipe (run before every test session)"
    prevention: "Always verify API server, UI server, and proxy before testing"
    discovered: "Formula cells displayed error icons at UAT handoff because API wasn't started"
    applies_to: "all projects with API backends"

  - id: dev-mode-double-invoke
    severity: medium
    symptom: "Persistent state (localStorage, IndexedDB, remote writes) gets clobbered on load, or side effects run twice in dev but once in production"
    cause: "Many dev-mode frameworks intentionally double-invoke lifecycle/effect code to surface bugs (e.g., React StrictMode double-mounts components). Effects that write to persistent state write twice; the second write may overwrite fresh state with stale closure values."
    resolution: "Guard the write with a ref/flag, or make the write idempotent against itself"
    prevention: "When testing persistence logic, always include a full page reload (not just re-render). Any bug that only surfaces in dev is still a bug — production will eventually hit it."
    applies_to: "any framework with dev-mode double-invoke (React StrictMode, Vue dev hooks, etc.)"

  - id: virtualized-list-dom-absent
    severity: medium
    symptom: "Cannot find expected rows/items in DOM despite data being present"
    cause: "Virtualized UI libraries (data grids, infinite lists, tree views) only render items in the visible viewport — off-screen items don't exist in the DOM"
    resolution: "Scroll the target into view before asserting, or verify total count via library-exposed APIs (pagination text, item count, etc.)"
    prevention: "Don't assert on specific item content without ensuring the item is in the rendered viewport. Test scroll behavior as a first-class concern."
    applies_to: "any UI using virtualization (MUI DataGrid, react-window, AG Grid, TanStack Virtual, etc.)"

  - id: tab-id-reuse
    severity: low
    symptom: "Browser tool calls fail with 'tab not found'"
    cause: "Tab IDs from previous browser tool sessions are invalid after the session ends"
    resolution: "Request a fresh tab context before starting a new session"
    prevention: "Never reuse tab IDs across sessions"
    applies_to: "AI-assisted browser tools that track tabs by ID"

  - id: port-conflicts
    severity: low
    symptom: "Dev server unreachable at expected port"
    cause: "Multiple Vite dev servers competing for ports (5173, 5174, etc.)"
    resolution: "Check Vite console output for actual port"
    prevention: "Use explicit --port flag or check process list"
    applies_to: "all Vite projects"

  - id: playwright-cli-open-url
    severity: low
    symptom: "playwright-cli open <url> lands on about:blank"
    cause: "URL may not be applied on open command in some versions"
    resolution: "Use goto after open to navigate"
    prevention: "Always follow open with goto <url>"
    applies_to: "Playwright CLI"

  - id: invisible-overlay-intercepts-pointers
    severity: medium
    symptom: "Click on an element behind an open popover/menu/dialog times out with 'subtree intercepts pointer events' or similar"
    cause: "Many popover/menu/dialog components render an invisible full-page backdrop to capture outside-click events. The backdrop intercepts all pointer events, blocking clicks on elements behind the overlay even though the overlay appears 'invisible' to the human eye."
    resolution: "Close the overlay (usually Escape) before clicking other page elements"
    prevention: "When interacting with popovers/menus/dialogs in tests, explicitly close them before moving on to other interactions. Treat overlay dismissal as a required step, not an assumption."
    applies_to: "any UI library with backdrop-based outside-click handling (MUI, Radix, Headless UI, Ant Design, etc.)"

  - id: playwright-cli-fill-requires-snapshot
    severity: low
    symptom: "fill/click with role selectors fails with 'Ref not found in current page snapshot'"
    cause: "Playwright CLI requires a current snapshot to resolve role-based selectors. After goto, snapshot may not be cached."
    resolution: "Run 'snapshot' command first, then use element refs (e12, e15, etc.) for fill/click"
    prevention: "Always snapshot after goto before interacting with elements"
    applies_to: "Playwright CLI"

  - id: auth-redirect-after-login
    severity: low
    symptom: "After login, test expects to be on target page but lands on a default home/dashboard route"
    cause: "Some apps always redirect to a default landing page after fresh authentication, regardless of prior navigation"
    resolution: "After login, explicitly navigate to target page with goto"
    prevention: "Auth flow scripts should always include a goto to the intended page after login completes"
    applies_to: "all projects where post-login redirect is controlled by the server"

  - id: remote-api-initial-load-delay
    severity: medium
    symptom: "First snapshot after goto captures 'Loading...' instead of page content"
    cause: "Remote API has network latency. Page renders loading state immediately, data arrives 2-5s later."
    resolution: "Wait for specific content element before snapshotting: sleep 3 then snapshot, or use waitForSelector"
    prevention: "After navigating to a data-driven route, wait for heading or content before asserting"
    applies_to: "all projects with remote API backends — wait for content before asserting"

  - id: gcp-vm-disk-full-truncated-bundles
    severity: high
    symptom: "ERR_HTTP2_PROTOCOL_ERROR 200 (OK) on JS bundle — React app never mounts, <div id='root'> stays empty"
    cause: "Old Docker images accumulate on GCP VM. Disk fills up, next deploy's docker pull fails or nginx serves truncated/corrupted JS bundles over HTTP/2."
    resolution: "SSH into VM, run `docker image prune -a -f --filter 'until=24h' && docker system prune -f`, clean gcloud logs, then redeploy."
    prevention: "Add periodic VM-side Docker prune to deploy script or cron. Monitor `df -h /` on VM — alert if >85%."
    applies_to: "all GCP-deployed Docker projects"

  - id: mobile-locators-differ-from-desktop
    severity: medium
    symptom: "Playwright test passes on desktop but fails on mobile — element not found or wrong placeholder"
    cause: "Mobile layouts use different components with different placeholder text, input patterns, and DOM structure."
    resolution: "Use flexible locators that work across viewports, or write separate mobile-specific locators."
    prevention: "When writing tests for both desktop and mobile, check both viewports' DOM before choosing locators. Consider a locator helper that returns viewport-appropriate selectors."
    applies_to: "all projects with responsive/mobile layouts"

  - id: color-only-status-indicators
    severity: medium
    symptom: "Test asserts element exists in DOM but cannot verify its visual state programmatically"
    cause: "Component conveys status via color only — no aria attribute, data attribute, or text alternative encodes the state"
    resolution: "Add programmatic state indicator (aria-invalid, data-state, aria-label with status text) alongside the visual indicator"
    prevention: "Design specs must define both visual and programmatic indicators for every state. See knowledge/design/accessibility-testability-principles.yaml"
    discovered: "Promoted from disciplines/design.md — pattern observed across multiple projects where visual states had no programmatic equivalent"
    applies_to: "all projects — any component with color-based status indicators"

