# Maintenance
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Test Effectiveness Metrics
# ─────────────────────────────────────────────

test_effectiveness_metrics:
  description: >
    Quantitative measures for evaluating the quality and impact of a test suite beyond
    raw coverage percentages. These metrics should be tracked continuously, not just
    at release time.

  defect_leakage:
    definition: "Defects found in production / total defects found (pre-release + production)"
    formula: "defect_leakage = production_defects / (pre_release_defects + production_defects)"
    target: "< 10% — the majority of defects should be caught pre-release"
    interpretation: >
      High defect leakage means the test suite is catching defects in the wrong environment.
      Drill into which test phase (unit, integration, E2E) the leaking defects would have
      been caught by, and add coverage there.
    tracking: "Measure per release cycle. Track trend over time — improvement matters more than the absolute value."

  mttd_mttr_defect_granularity:
    description: >
      MTTD (Mean Time to Detect) and MTTR (Mean Time to Resolve) can be applied at defect
      granularity, not just incident level. This gives finer signal about test cycle efficiency.
    mttd:
      definition: "Average time from defect introduction (commit) to detection (test failure or bug report)"
      how_to_reduce: "Shift detection left — unit tests catch in minutes, E2E catches in hours, production monitoring catches in days"
    mttr:
      definition: "Average time from defect detection to verified resolution (fix deployed and confirmed)"
      how_to_reduce: "Clear reproduction steps, good error messages, fast CI feedback on fix PRs"
    usage: >
      Track MTTD per test tier (unit / integration / E2E / monitoring). A high MTTD at the
      unit tier signals missing unit test coverage. A high MTTD at the integration tier
      signals missing contract tests.

# ─────────────────────────────────────────────
# Test Design Techniques Taxonomy
# ─────────────────────────────────────────────

test_design_techniques:
  description: >
    A structured taxonomy of systematic test design techniques. Using named techniques
    ensures test cases are derived from the specification, not from developer intuition,
    and makes coverage rationale explicit.

  techniques:
    equivalence_partitioning:
      description: "Divide the input domain into partitions where all values in a partition are expected to behave the same way. Test one representative value from each partition."
      when_to_use: "Any input with a range or set of valid values. Reduces the number of test cases without sacrificing coverage."
      example: "For an age field (1–120), partitions: invalid-low (< 1), valid (1–120), invalid-high (> 120). Test one value from each."

    boundary_value_analysis:
      description: "Test at and immediately around partition boundaries, where defects cluster most often."
      when_to_use: "Any numeric range, string length limit, collection size limit, or date range."
      example: "For max 4 copies of a card: test 0, 1, 3, 4, 5. The boundaries (0, 1, 4, 5) are the high-value cases."

    decision_tables:
      description: "Map combinations of input conditions to expected outputs. Ensures all condition combinations are covered."
      when_to_use: "Business rules with multiple boolean or enumerated conditions that interact (e.g., access control, pricing rules)."
      example: "A table mapping (isAuthenticated × hasSubscription × isTrialExpired) to the set of accessible features."

    state_transitions:
      description: "Model the system as a state machine and derive test cases from the valid and invalid transitions between states."
      when_to_use: "Workflows with explicit lifecycle states (draft → published → archived; connecting → connected → disconnected)."
      example: "For a WebSocket connection: test all valid transitions and invalid transitions (e.g., send message from disconnected state)."

    pairwise_testing:
      description: "When the input space is a combination of N parameters each with M values, test all pairs of parameter values rather than all combinations. Catches most multi-factor defects with O(N × M²) instead of O(M^N) tests."
      when_to_use: "Configuration matrixes, multi-parameter API endpoints, cross-browser / cross-device test grids."
      tools: "PICT (Microsoft), AllPairs, pairwiser"

    model_based_testing:
      description: "Derive test cases automatically from a formal model of the system (state machine, data flow model, grammar). Tests are generated rather than hand-written."
      when_to_use: "Complex protocol implementations, parser/codec validation, UI flows with many branching paths."
      benefit: "Finds paths a human test designer would not think to write."

# ─────────────────────────────────────────────
# Test Reliability Patterns
# ─────────────────────────────────────────────

test_reliability:
  description: >
    Patterns for reducing test flakiness and maintaining a reliable test suite over time.
    An unreliable test suite trains developers to ignore failures, which eliminates the
    value of CI gates.

  self_healing_locators:
    description: >
      Locator strategies that can recover from minor DOM changes without requiring test
      code updates. Reduces maintenance burden caused by UI refactoring.
    strategies:
      - "Prefer semantic locators: accessible roles, ARIA labels, and test IDs over CSS class names or XPath"
      - "Use data-testid attributes as stable anchors — they survive class rename refactors"
      - "Fallback chains: try primary locator first; if not found, try secondary; log which locator was used"
      - "Avoid position-based locators (nth-child) — they break when sibling elements are added"
    tooling_note: "Some frameworks (Playwright, Healenium) offer built-in self-healing via visual or structural similarity matching."

  flakiness_slo:
    target: "< 1% flaky test rate across the full test suite"
    definition: "A flaky test is one that fails intermittently without a code change — the failure is non-deterministic."
    enforcement:
      - "Track flaky tests in a dedicated backlog; do not allow them to accumulate silently"
      - "A test that fails 3 times non-deterministically in CI is quarantined (tagged @flaky, excluded from blocking gates) until fixed"
      - "Quarantined tests run in parallel non-blocking mode — they still execute but do not block merge"
      - "Flakiness rate > 1% triggers a reliability focus — block new test coverage until flakiness is under 1%"
    common_causes:
      - "Timing-dependent assertions (fixed sleeps instead of event-driven waits)"
      - "Shared test data or database state between tests (tests must be independent)"
      - "Non-deterministic ordering of API results without explicit sort"
      - "Race conditions in async setup/teardown"

# ─────────────────────────────────────────────
# Playwright CI Configuration
# ─────────────────────────────────────────────

playwright_ci_configuration:
  description: >
    Playwright configuration for CI environments that balances flake mitigation
    against false-negative masking. The key insight: retry policy, artifact
    capture, and worker count must be calibrated together. Retrying without
    capturing traces leaves failures undebuggable; capturing always wastes disk.
    Think of it like a black-box flight recorder — only activates when something
    goes wrong.

  ci_settings:
    retries:
      value: 2
      rationale: >
        Two retries on CI distinguishes genuine failures (fail all 3 runs) from
        infrastructure noise (usually flakes pass on retry 1 or 2). Do NOT use
        retries locally — they hide real failures during development.
    workers:
      value: 1
      rationale: >
        Single worker on CI prevents resource contention that causes timing
        flakes on shared runners. Locally, use undefined (auto) for speed.
    trace:
      value: "on-first-retry"
      rationale: >
        Generates a Playwright trace archive on the first retry of any test.
        This means you get a trace exactly when the test was flaky — the first
        run failed but you can trace-view the failure to diagnose root cause.
    screenshot:
      value: "only-on-failure"
      rationale: >
        Captures screenshot only when the test ultimately fails (after all
        retries). No cost on passing tests; full visual state at failure point.
    video:
      value: "retain-on-failure"
      rationale: >
        Records video of every test run but only keeps it when the test fails.
        Video + trace together give full temporal context for flake diagnosis.

  reporters:
    list:
      - "html"
      - "junit (outputFile: results.xml)"
    note: >
      HTML reporter is human-readable for local investigation. JUnit XML feeds
      CI dashboards and GitHub Actions test result annotations.

  config_template: |
    // playwright.config.ts
    export default defineConfig({
      timeout: 30000,
      expect: { timeout: 5000 },
      fullyParallel: true,
      forbidOnly: !!process.env.CI,
      retries: process.env.CI ? 2 : 0,
      workers: process.env.CI ? 1 : undefined,
      reporter: [["html"], ["junit", { outputFile: "results.xml" }]],
      use: {
        trace: "on-first-retry",
        screenshot: "only-on-failure",
        video: "retain-on-failure",
      },
    });

  source: e2e-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Playwright Custom Test Fixtures
# ─────────────────────────────────────────────

playwright_test_fixtures:
  description: >
    Playwright's `test.extend()` mechanism creates per-test fixtures that handle
    setup and teardown automatically. This is the Playwright equivalent of
    pytest fixtures — each test receives a fresh, pre-configured object, and
    the fixture cleans up after use. Think of it like a vending machine that
    gives each test its own pre-built sandwich and disposes of it when done,
    rather than sharing a communal sandwich that gets progressively eaten.

  why_use_fixtures:
    - "Each test gets its own data — no shared state, no ordering dependencies"
    - "Teardown is guaranteed even if the test fails or throws"
    - "Test code only declares what it needs; fixture handles how to build it"

  pattern: |
    // fixtures/index.ts  — extend Playwright's base test with custom fixtures
    import { test as base } from "@playwright/test";

    export const test = base.extend<{
      testUser: { email: string; name: string };
      adminUser: { email: string };
    }>({
      testUser: async ({}, use) => {
        const user = await db.createUser({ name: "Test", email: `t-${Date.now()}@test.com` });
        await use(user);                   // <— test runs here
        await db.deleteUser(user.email);   // <— teardown: guaranteed to run
      },

      adminUser: async ({}, use) => {
        await use({ email: process.env.ADMIN_EMAIL! });
        // No teardown needed for static admin
      },
    });

    // In tests — import the extended test, not Playwright's base:
    import { test, expect } from "./fixtures";

    test("user can update profile", async ({ page, testUser }) => {
      // testUser was created in the fixture; available here
      await page.goto("/login");
      await page.getByLabel("Email").fill(testUser.email);
      // ...
    });

  rules:
    - "Import from your local fixtures file, not directly from @playwright/test — otherwise fixture types won't resolve"
    - "Use `Date.now()` or uuid in fixture-created user emails to prevent conflicts between parallel tests"
    - "Teardown runs in the post-yield block — put cleanup there, not in beforeEach/afterEach"
    - "Fixture scope defaults to 'test'; use 'worker' scope for expensive shared resources (DB connection pools)"

  source: e2e-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Playwright Waiting Strategies
# ─────────────────────────────────────────────

playwright_waiting_strategies:
  description: >
    Correct waiting is the single biggest factor in Playwright test stability.
    The rule: always wait for a CONDITION, never for a DURATION. A fixed
    `waitForTimeout(3000)` is a coin flip — on a slow CI runner it's not
    enough; on a fast local machine it wastes 3 seconds on every run. Think
    of waiting like a traffic light: you don't wait 90 seconds and hope the
    light has changed; you wait UNTIL you see green.

  anti_pattern:
    description: "Fixed duration sleep — the flake factory"
    code: "await page.waitForTimeout(3000); // ❌ flaky AND slow"
    why_wrong: >
      Duration-based waits fail in two ways: too short on slow runners (flaky),
      too long on fast runners (slow). They encode an assumption about timing
      that breaks whenever the environment changes.

  preferred_strategies:
    load_state:
      description: "Wait for page network activity to settle"
      code: "await page.waitForLoadState('networkidle');"
      when: "After navigation actions when the page fetches data on load"

    url_change:
      description: "Wait for the URL to match a pattern"
      code: "await page.waitForURL('/dashboard');"
      when: "After form submissions or actions that trigger navigation"

    element_assertion:
      description: "Auto-waiting assertion — Playwright retries until condition is met"
      code: |
        await expect(page.getByText("Welcome")).toBeVisible();
        await expect(page.getByRole("button", { name: "Submit" })).toBeEnabled();
      when: "The most common case — wait for a specific UI element to appear or become interactive"
      note: >
        This is the preferred pattern for nearly all waits. Playwright retries
        the assertion repeatedly until it passes or the timeout expires. The
        element doesn't need to exist when the assertion starts.

    response_wait:
      description: "Wait for a specific API response and inspect its data"
      code: |
        const responsePromise = page.waitForResponse(
          (response) => response.url().includes("/api/users") && response.status() === 200
        );
        await page.getByRole("button", { name: "Load Users" }).click();
        const response = await responsePromise;
        const data = await response.json();
        expect(data.users).toHaveLength(10);
      when: >
        When you need to both trigger a network request and validate the
        response data — useful for integration tests that hit a real backend.

    parallel_conditions:
      description: "Wait for multiple conditions simultaneously"
      code: |
        await Promise.all([
          page.waitForURL("/success"),
          page.waitForLoadState("networkidle"),
          expect(page.getByText("Payment successful")).toBeVisible(),
        ]);
      when: >
        Multi-signal transitions (URL change + data load + UI update) where
        all conditions must be true before proceeding.

  rules:
    - "Never use waitForTimeout in test code — if you find yourself reaching for it, find the condition you should be waiting for instead"
    - "Auto-waiting assertions (expect(...).toBeVisible()) are preferred over imperative waitFor calls"
    - "For API-integrated tests, use waitForResponse before triggering the action that causes the request"

  source: e2e-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Playwright Network Interception
# ─────────────────────────────────────────────

playwright_network_interception:
  description: >
    `page.route()` intercepts and modifies network requests before they reach
    the server. Use it for two distinct purposes: (1) simulating error
    conditions your real backend can't easily produce (500s, timeouts, 429s),
    and (2) mocking third-party services you shouldn't hit in tests. Think of
    it like a traffic cop that can redirect, hold, or turn back requests before
    they reach their destination.

    Important distinction: use `page.route()` for EXTERNAL dependencies (third-
    party services, edge cases) only. For your own API, hit the real test
    backend seeded with factory data — mocked backends can't catch contract breaks.

  use_cases:
    error_simulation:
      description: "Simulate server errors to verify frontend degradation behavior"
      code: |
        test("shows error state when API fails", async ({ page }) => {
          await page.route("**/api/memories", (route) => {
            route.fulfill({ status: 500, body: JSON.stringify({ error: "Internal Server Error" }) });
          });
          await page.goto("/memories");
          await expect(page.getByText("Failed to load memories")).toBeVisible();
        });
      when: "Testing error UI that's hard to trigger with real data"

    third_party_mock:
      description: "Mock external services to prevent side effects and rate limit consumption"
      code: |
        await page.route("**/api/stripe/**", (route) => {
          route.fulfill({ status: 200, body: JSON.stringify({ id: "mock_pi_123", status: "succeeded" }) });
        });
      when: "Third-party payment, auth, analytics, or embed services"

    request_modification:
      description: "Intercept and modify a request before it continues"
      code: |
        await page.route("**/api/users", async (route) => {
          const postData = JSON.parse(route.request().postData() || "{}");
          postData.role = "admin";
          await route.continue({ postData: JSON.stringify(postData) });
        });
      when: "Injecting test-specific request attributes without changing real server behavior"

  rules:
    - "Call route() BEFORE the action that triggers the request — not after"
    - "Use route.unroute() or page.unrouteAll() to restore real behavior within the same test"
    - "Do NOT use page.route() to mock your own API endpoints in integration tests — that defeats the purpose of integration testing"

  source: e2e-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Playwright Visual Regression Testing
# ─────────────────────────────────────────────

playwright_visual_regression:
  description: >
    Visual regression tests capture a screenshot baseline and diff subsequent
    runs against it. They catch visual changes that DOM assertions miss —
    CSS regressions, layout shifts, missing images. The threshold setting is
    critical: too strict and font hinting differences between OS environments
    cause false failures; too loose and real regressions pass.

  core_pattern: |
    test("component renders correctly", async ({ page }) => {
      await page.goto("/memories");
      // Wait for content to fully render before screenshotting
      await expect(page.getByRole("heading", { name: "Memories" })).toBeVisible();

      // Full-page screenshot with pixel tolerance
      await expect(page).toHaveScreenshot("memories-page.png", {
        fullPage: true,
        maxDiffPixels: 100,   // allow up to 100 differing pixels
      });
    });

    // Component-level screenshot
    test("button in all states", async ({ page }) => {
      const button = page.getByRole("button", { name: "Create Memory" });
      await expect(button).toHaveScreenshot("btn-default.png");
      await button.hover();
      await expect(button).toHaveScreenshot("btn-hover.png");
    });

  threshold_guidance:
    maxDiffPixels:
      description: "Maximum number of pixels that can differ before the test fails"
      recommended: 100
      rationale: >
        Sub-pixel rendering, font hinting, and anti-aliasing differ between
        macOS and Linux. 100 pixels accommodates these without hiding real
        layout changes. For component-level screenshots, use 10-20.
    maxDiffPixelRatio:
      description: "Alternative: maximum ratio of differing pixels to total pixels"
      recommended: 0.01
      rationale: "Scales with screenshot size — more useful for responsive layouts"

  baseline_management:
    - "Store baselines per-OS: macOS and Linux renderers produce different anti-aliasing. A baseline committed on macOS will fail on a Linux CI runner."
    - "Updating baselines requires the --update-snapshots flag — never auto-regenerate without human review"
    - "Changed snapshots are changed contracts: PR descriptions must include a rendered diff when snapshot files change"
    - "Wait for all async content (data loading, animations) to complete before screenshotting — a loading spinner in the baseline means every subsequent test race-conditions against it"

  source: e2e-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Playwright test.step for Structured Reporting
# ─────────────────────────────────────────────

playwright_test_step:
  description: >
    `test.step()` groups related assertions inside a named sub-unit of a test.
    When a step fails, the test report shows exactly which step failed — like
    a recipe card where each numbered step is labeled. Without steps, a 15-line
    test produces a single failure point ("line 8 failed") that requires re-reading
    the whole test to understand context.

    Use for multi-phase tests (setup → action → assertion → verification) where
    each phase is conceptually distinct.

  pattern: |
    test("checkout flow", async ({ page }) => {
      await test.step("Add item to cart", async () => {
        await page.goto("/products");
        await page.getByRole("button", { name: "Add to Cart" }).click();
        await expect(page.getByText("1 item in cart")).toBeVisible();
      });

      await test.step("Proceed to checkout", async () => {
        await page.goto("/cart");
        await page.getByRole("button", { name: "Checkout" }).click();
        await expect(page).toHaveURL("/checkout");
      });

      await test.step("Complete payment", async () => {
        await page.getByLabel("Card Number").fill("4242424242424242");
        await page.getByRole("button", { name: "Pay Now" }).click();
        await expect(page.getByText("Payment successful")).toBeVisible();
      });
    });

  rules:
    - "Name steps as imperative phrases ('Add item', 'Submit form') not as assertions ('check cart has item')"
    - "Each step should be independently comprehensible — if a step fails, the name alone should tell you what went wrong"
    - "Do not nest more than 2 levels deep — deeply nested steps are a sign the test is doing too much"

  when_to_use:
    - "Multi-phase user flows (cart → checkout → confirmation)"
    - "Tests that combine setup, action, and state verification"
    - "Any test longer than ~10 lines where failure localization matters"

  source: e2e-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# TypeScript Test Factory Pattern
# ─────────────────────────────────────────────

typescript_test_factory:
  description: >
    Test factories generate valid objects with realistic defaults and allow
    selective overrides for what the test actually cares about. They prevent
    two failure modes: (1) brittle tests that break when a model gains a new
    required field, and (2) verbose test setup where half the test is
    constructing objects unrelated to the assertion.

    Think of a factory like an order form with pre-filled defaults — you only
    fill in what you actually care about; everything else comes pre-populated.

  core_pattern: |
    // tests/factories/user.factory.ts
    import { faker } from "@faker-js/faker";

    export function createUser(overrides?: Partial<User>): User {
      return {
        id: faker.string.uuid(),
        name: faker.person.fullName(),
        email: faker.internet.email(),
        createdAt: faker.date.past(),
        ...overrides,         // <— caller overrides only what they care about
      };
    }

    // Factory for building collections
    export function createUsers(count: number, overrides?: Partial<User>): User[] {
      return Array.from({ length: count }, () => createUser(overrides));
    }

    // Usage: test only specifies what matters
    it("rejects users with duplicate email", () => {
      const user = createUser({ email: "same@example.com" });
      // Other fields are realistic but irrelevant — factory handled them
    });

  rules:
    - "One factory per domain model — do not inline object construction in test bodies"
    - "Defaults must be valid and realistic — a factory that produces invalid objects by default is not a factory, it's a template"
    - "The override spread goes LAST — caller values must win over factory defaults"
    - "Embedding vectors in factories must be deterministic (hash-based), not random — random vectors produce non-reproducible similarity ordering"
    - "For multi-tenant systems: factories must accept explicit workspace_id rather than auto-generating one, or workspace-isolation tests become accidentally correct"

  tooling:
    typescript: "@faker-js/faker — produces realistic data with consistent types"
    python: "factory-boy — class-based factories with ORM integration; or plain functions with faker"

  source: javascript-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Vitest Mock Lifecycle Management
# ─────────────────────────────────────────────

vitest_mock_lifecycle:
  description: >
    Mocks that persist between tests are one of the most common sources of test
    ordering flakes — the test suite passes when run in order A→B but fails when
    run B→A, because test B's mock state leaked into test A's expectations.

    Think of mocks like a whiteboard: you must erase it after each use or the
    next person finds previous session's work still written there.

  patterns:
    clear_mocks:
      description: "Reset mock call counts and instances after each test"
      code: |
        beforeEach(() => {
          vi.clearAllMocks();  // clears call counts, instances — does NOT remove implementation
        });
      when: >
        Any test that asserts `expect(mock).toHaveBeenCalledWith(...)` or
        `expect(mock).toHaveBeenCalledTimes(N)`. Without clearing, a second
        test sees the call counts from the first test.

    restore_spies:
      description: "Restore spied functions to their original implementation after each test"
      code: |
        let loggerSpy: vi.SpyInstance;

        beforeEach(() => {
          loggerSpy = vi.spyOn(logger, "info");
        });

        afterEach(() => {
          loggerSpy.mockRestore();  // restores original function
        });
      when: >
        When using vi.spyOn() on real objects. Without restore, the spy persists
        to subsequent tests and all calls (including from unrelated tests) get
        recorded.

    fake_timers:
      description: "Use fake timers to control time-based behavior deterministically"
      code: |
        it("should call function after delay", () => {
          vi.useFakeTimers();
          const callback = vi.fn();
          setTimeout(callback, 1000);

          expect(callback).not.toHaveBeenCalled();
          vi.advanceTimersByTime(1000);   // fast-forward 1 second instantly
          expect(callback).toHaveBeenCalled();

          vi.useRealTimers();            // MUST restore — fake timers leak
        });
      why: >
        Fake timers replace the JS runtime's setTimeout/setInterval/Date with
        a controlled version. `advanceTimersByTime(N)` jumps forward N ms
        instantly — a 60-second expiry test runs in microseconds. Always
        restore real timers; fake timers left active will stall any test
        that uses Promise.resolve() or other microtask-dependent patterns.

  rules:
    - "Call vi.clearAllMocks() in beforeEach for any describe block that asserts mock call counts"
    - "Always call mockRestore() on spies in afterEach — not clearMocks(), which does not restore originals"
    - "Always call vi.useRealTimers() after a test that uses vi.useFakeTimers()"
    - "Prefer vi.advanceTimersByTime() over sleeping in test code — it's deterministic and instant"

  source: javascript-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# React Hook Testing
# ─────────────────────────────────────────────

react_hook_testing:
  description: >
    Custom React hooks can't be called directly outside a component — React
    enforces the rules of hooks. `renderHook` creates a minimal test harness
    (a throwaway component) that lets you call the hook and observe its return
    values. `act()` wraps any action that causes state updates so React can
    process them synchronously.

    Think of `renderHook` like a blank stage for a solo actor: the hook gets
    to perform, but there's no full production around it.

  core_pattern: |
    import { renderHook, act } from "@testing-library/react";
    import { useCounter } from "./useCounter";

    describe("useCounter", () => {
      it("initializes with given value", () => {
        const { result } = renderHook(() => useCounter(10));
        expect(result.current.count).toBe(10);
      });

      it("increments count", () => {
        const { result } = renderHook(() => useCounter());

        act(() => {
          result.current.increment();   // state mutation — must be wrapped in act()
        });

        expect(result.current.count).toBe(1);
      });

      it("resets to initial value after multiple increments", () => {
        const { result } = renderHook(() => useCounter(5));

        act(() => {
          result.current.increment();
          result.current.increment();
        });
        expect(result.current.count).toBe(7);

        act(() => { result.current.reset(); });
        expect(result.current.count).toBe(5);  // back to initial
      });
    });

  rules:
    - "Any call that causes a state update (increment, decrement, reset, dispatch) must be wrapped in act()"
    - "Access hook return values via result.current — re-access after each act() to get latest state"
    - "For async hooks, use await act(async () => { ... }) with renderHook from @testing-library/react (v14+)"
    - "Do not test hooks by rendering a real component — that tests the component, not the hook in isolation"

  source: javascript-testing-patterns/references/advanced-testing-patterns.md

# ─────────────────────────────────────────────
# pytest monkeypatch for Environment Control
# ─────────────────────────────────────────────

pytest_monkeypatch:
  description: >
    pytest's `monkeypatch` fixture patches attributes, environment variables,
    and dictionary entries for the duration of a single test, then automatically
    restores them. It's safer than `os.environ[...] = ...` because the restore
    is guaranteed even if the test raises — no leaked env state between tests.

    Think of monkeypatch like a temporary tattoo: it looks real for the test,
    then disappears cleanly without any permanent change.

  common_patterns:
    environment_variable:
      description: "Set, modify, or remove environment variables for one test"
      code: |
        def test_uses_custom_db_url(monkeypatch):
            monkeypatch.setenv("DATABASE_URL", "postgresql://localhost/test_db")
            assert get_database_url() == "postgresql://localhost/test_db"

        def test_falls_back_when_not_set(monkeypatch):
            monkeypatch.delenv("DATABASE_URL", raising=False)  # raising=False: don't error if not set
            assert get_database_url() == "sqlite:///:memory:"

    attribute_patch:
      description: "Temporarily replace an object attribute or module-level function"
      code: |
        def test_uses_test_api_key(monkeypatch):
            monkeypatch.setattr(config, "api_key", "test-key-123")
            assert config.get_api_key() == "test-key-123"

    dictionary_entry:
      description: "Set or delete dictionary entries (useful for feature flags, registry dicts)"
      code: |
        def test_feature_enabled(monkeypatch):
            monkeypatch.setitem(FEATURE_FLAGS, "new_search", True)
            assert is_feature_enabled("new_search") is True

  rules:
    - "Always use monkeypatch instead of direct os.environ mutation — monkeypatch guarantees cleanup"
    - "Use raising=False with delenv when the variable might not exist in all CI environments"
    - "For complex mocking (return values, side effects), use unittest.mock.patch or pytest-mock's mocker fixture"
    - "monkeypatch scope is function by default — it CANNOT be used with session-scoped fixtures without explicitly scoping the monkeypatch fixture"

  source: python-testing-patterns/references/advanced-patterns.md

# ─────────────────────────────────────────────
# Retry Behavior Testing Pattern
# ─────────────────────────────────────────────

retry_behavior_testing:
  description: >
    Services with retry logic need tests for three distinct scenarios: (1) it
    succeeds on a later attempt, (2) it gives up after max retries, and (3) it
    does NOT retry on permanent (non-transient) errors.

    Use `side_effect` lists to script a mock's response sequence. Think of it
    like a stage direction script: "mock will fail twice, then succeed on the
    third call." The test just calls the service and verifies the behavior —
    the script does all the work.

    This pattern is important for any service that wraps an external call
    (embedding API, ARQ job, Redis, external webhook) with retry logic.

  pattern: |
    from unittest.mock import Mock

    def test_succeeds_on_retry():
        """Service retries transient errors and succeeds."""
        client = Mock()
        # side_effect list: consumed in order, one per call
        client.request.side_effect = [
            ConnectionError("Transient failure"),
            ConnectionError("Transient failure"),
            {"status": "ok"},               # succeeds on 3rd attempt
        ]
        service = ServiceWithRetry(client, max_retries=3)
        result = service.fetch()

        assert result == {"status": "ok"}
        assert client.request.call_count == 3   # called exactly 3 times

    def test_gives_up_after_max_retries():
        """Service stops after max_retries consecutive failures."""
        client = Mock()
        client.request.side_effect = ConnectionError("Always fails")

        service = ServiceWithRetry(client, max_retries=3)
        with pytest.raises(ConnectionError):
            service.fetch()

        assert client.request.call_count == 3   # retried exactly max_retries times

    def test_permanent_errors_not_retried():
        """Permanent errors are raised immediately without retry."""
        client = Mock()
        client.request.side_effect = ValueError("Invalid input — not a transient error")

        service = ServiceWithRetry(client, max_retries=3)
        with pytest.raises(ValueError):
            service.fetch()

        assert client.request.call_count == 1   # called once, not retried

  rules:
    - "Test all three scenarios: transient-then-success, max-retries-exceeded, and permanent-not-retried"
    - "Assert call_count to prove the retry policy, not just the final outcome"
    - "A test that only asserts the final exception type does not prove that retries happened or did not happen"

  source: python-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Time Control in Tests (freeze_time)
# ─────────────────────────────────────────────

time_control_in_tests:
  description: >
    Any code that calls `datetime.now()`, `time.time()`, or computes durations
    and expiry windows is non-deterministic in tests — the result depends on
    when the test runs. Freeze the clock instead of computing expected values
    relative to the current time.

    Think of freezegun like hitting pause on a clock in a museum: everything
    that reads the clock gets the same frozen moment, making "expires in 1 hour"
    produce the same result at 9 AM and 9 PM.

  python_pattern: |
    from freezegun import freeze_time
    from datetime import datetime

    @freeze_time("2026-01-15 10:00:00")
    def test_token_expires_at_correct_time():
        """Token created at 10:00 with 1-hour TTL expires at 11:00."""
        token = create_token(expires_in_seconds=3600)
        assert token.expires_at == datetime(2026, 1, 15, 11, 0, 0)
        # ↑ Deterministic: frozen clock makes this exact assertion always valid

    @freeze_time("2026-01-15 10:00:00")
    def test_token_not_expired_within_validity():
        token = create_token(expires_in_seconds=3600)
        assert not token.is_expired()

    @freeze_time("2026-01-15 12:00:00")
    def test_token_expired_after_validity():
        # Created at 11:30, current frozen time is 12:00 → expired
        token = Token(expires_at=datetime(2026, 1, 15, 11, 30, 0))
        assert token.is_expired()

    def test_time_travel_within_test():
        """Time travel within a single test using freeze_time context manager."""
        with freeze_time("2026-01-01") as frozen_time:
            item = create_item()
            assert item.created_at == datetime(2026, 1, 1)

            frozen_time.move_to("2026-01-15")
            assert item.age_days == 14   # always 14, regardless of when test runs

  typescript_equivalent: |
    // Vitest fake timers — for setTimeout, setInterval, Date.now()
    vi.useFakeTimers();
    vi.setSystemTime(new Date("2026-01-15T10:00:00Z"));
    // ... test code that reads Date.now() or new Date() ...
    vi.useRealTimers();  // always restore

  rules:
    - "Use freeze_time (Python) or vi.useFakeTimers/vi.setSystemTime (TS) for any assertion comparing datetime objects"
    - "Never assert on datetime.now() directly — always freeze the clock first"
    - "Always restore real timers in TypeScript (vi.useRealTimers()) — fake timers left active stall Promise-based async code"
    - "For TTL / expiry logic, freeze time BEFORE creating the token/session/object so creation time is also controlled"

  source: python-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# pytest Marker Taxonomy
# ─────────────────────────────────────────────

pytest_marker_taxonomy:
  description: >
    pytest markers tag tests so they can be selected or excluded from a run.
    A well-structured marker taxonomy lets CI run only fast tests on every
    commit, reserve slow/integration/E2E tests for pre-merge pipelines, and
    quarantine known-flaky tests without blocking the suite.

    Markers are like routing labels on packages: the courier (CI) reads them
    to decide which belt (pipeline stage) each package goes to.

  standard_markers:
    slow: "Tests that take more than ~2 seconds; excluded from developer's `pytest -m 'not slow'` local run"
    integration: "Tests that require a real database, Redis, or external service; excluded from unit-only CI jobs"
    e2e: "Full browser/Playwright tests; run only in dedicated E2E pipeline stage"
    flaky: "Tests quarantined for known flakiness; run in non-blocking mode until fixed"

  registration_requirement: |
    # pyproject.toml — MUST register markers before first use
    [tool.pytest.ini_options]
    markers = [
        "slow: marks tests as slow (deselect with '-m \"not slow\"')",
        "integration: marks tests requiring real infrastructure",
        "e2e: marks Playwright/browser-based E2E tests",
        "flaky: marks tests with known flakiness — quarantined from blocking gates",
    ]

  usage: |
    @pytest.mark.slow
    def test_full_index_rebuild():
        ...

    @pytest.mark.integration
    @pytest.mark.asyncio
    async def test_similarity_search_workspace_isolation():
        ...

    # Run only fast unit tests locally
    # pytest -m "not slow and not integration and not e2e"

    # Run integration tests in CI pre-merge job
    # pytest -m "integration"

  critical_rule: >
    Markers MUST be registered in pyproject.toml before first use. An unregistered
    marker emits PytestUnknownMarkWarning and silently breaks `-m <marker>` filtering
    — the command runs without error but returns ALL tests regardless of the filter.
    Register markers before writing the first test that uses them.

  source: python-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Test Naming Convention
# ─────────────────────────────────────────────

test_naming_convention:
  description: >
    A consistent test name is the test's documentation. When a test fails in
    CI, the name must tell you what broke without reading the test body. A
    test named `test_1` or `test_user` is a black box — you read 20 lines to
    understand what it was testing. A test named `test_create_memory_with_duplicate_id_raises_conflict`
    tells you everything.

  pattern:
    python: "test_<unit>_<scenario>_<expected_outcome>"
    examples:
      good:
        - "test_create_user_with_valid_data_returns_user"
        - "test_create_user_with_duplicate_email_raises_conflict"
        - "test_get_memory_with_unknown_id_returns_404"
        - "test_similarity_search_returns_only_requesting_workspace_memories"
        - "test_token_is_expired_after_validity_period"
      bad:
        - "test_1"
        - "test_user"
        - "test_function"
        - "test_api"  # Too vague — which API, which behavior?

  name_vs_scenario_rule: >
    The test name must match the scenario the test actually exercises. A name
    like `test_score_above_floor_uses_compound_formula` that exercises a
    BELOW-floor scenario is actively harmful — it passes code review but
    becomes a maintenance trap when the assertion changes. If the test name
    contains a condition (`when_X`, `if_Y`, `above_N`) the test body must
    actually exhibit that condition.

  docstring_convention: |
    def test_create_memory_with_duplicate_id_raises_conflict():
        """Creating a memory with an ID that already exists raises MemoryConflictError."""
        # One sentence: what input causes what behavior. No implementation details.

  rules:
    - "Name starts with test_, then unit (the thing being tested), then scenario, then expected outcome"
    - "If the name contains a predicate, the test body must satisfy that predicate — mismatch is a bug"
    - "Docstring: one sentence describing the input-to-output contract, not the implementation"
    - "TypeScript/Vitest: use nested `describe` blocks for grouping, with `it()` using natural language names"

  typescript_pattern: |
    describe("MemoryService", () => {
      describe("createMemory", () => {
        it("returns the created memory with a generated ID", async () => { ... });
        it("throws MemoryConflictError when ID already exists", async () => { ... });
        it("rejects embeddings with wrong dimension count", async () => { ... });
      });
    });

  source: python-testing-patterns/SKILL.md

# ─────────────────────────────────────────────
# Maintenance
# ─────────────────────────────────────────────

maintenance:
  add_patterns_when: >
    A cross-project testing pattern is discovered during an SDET session that would
    benefit future projects. Add it with context: what problem it solves, when to
    use it, and a language-agnostic template.
  boundary_rule: >
    Project-specific implementations (named services, specific enum values, project
    file paths) belong in the agent body, not in this file. This file contains
    methodology and templates only.
  review_cadence: "After each major SDET engagement that surfaces new general patterns"
