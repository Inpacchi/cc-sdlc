# Timing Defaults — Project-Populated Template
#
# This file is a TEMPLATE for project-specific timing measurements. It is NOT
# a canonical cc-sdlc rule set — values are project-specific by nature (they
# depend on framework choices, infrastructure, service latency, and UI library).
#
# Generic guidance on WHEN to use explicit waits (vs signal-based waits) lives
# in timing-paradigm.yaml. This file holds actual measured values.
#
# Each entry represents a measured wait profile for a specific scenario in this
# project's environment. Measure (see timing-paradigm.yaml § "Measuring Timing")
# before adding or updating any value.

id: timing-defaults
name: "Timing Defaults"
description: "Template: project-specific wait-time profiles. Populated per project with measured values."
pattern: entries
category: testing
spec_relevant: false
project_applicability:
  relevant_when: "Project has scenarios where signal-based waits aren't feasible and a timing default is needed"
  action_if_irrelevant: customize
last_updated: 2026-04-21

# ─── Example Structure ───
# Replace the examples below with this project's measured profiles.
# Each entry should include: description, default_wait_ms, measured_on, environment, notes.

example_page_navigation:
  description: "Time for app framework hydration + initial data fetch after route change"
  default_wait_ms: 2000
  measured_on: "YYYY-MM-DD"
  environment: "local dev / CI / staging"
  notes: "Replace with actual measurement. See timing-paradigm.yaml § 'Measuring Timing' for methodology."

example_data_fetch:
  description: "API response + cache hydration for data-heavy views"
  default_wait_ms: 1000
  measured_on: "YYYY-MM-DD"
  environment: "local dev / CI / staging"
  notes: "Varies by dataset size and server load. Re-measure if p95 latency changes."

example_modal_open:
  description: "Modal/dialog animation + mount time"
  default_wait_ms: 300
  measured_on: "YYYY-MM-DD"
  environment: "local dev / CI / staging"
  notes: "Most UI libraries target 200-300ms transitions."

example_auth_flow:
  description: "Login request + redirect to home"
  default_wait_ms: 2000
  measured_on: "YYYY-MM-DD"
  environment: "local dev / CI / staging"
  notes: "Includes auth endpoint round-trip + client-side redirect."

