# Component Shorthand
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

component_shorthand:
  description: >
    Standard abbreviations for common UI components. Use inside boxes
    to indicate what component type occupies a space without drawing
    every detail.

  interactive:
    - symbol: "[btn: Label]"
      meaning: "Button with label text"
      example: "[btn: Save]  [btn: Cancel]"

    - symbol: "[input: Placeholder]"
      meaning: "Text input field"
      example: "[input: Search brands...]"

    - symbol: "[select: Label]"
      meaning: "Dropdown / select"
      example: "[select: Category в–ј]"

    - symbol: "[checkbox: Label]"
      meaning: "Checkbox with label"
      example: "[checkbox: Show archived]"

    - symbol: "[toggle: Label]"
      meaning: "Toggle switch"
      example: "[toggle: Dark mode]"

    - symbol: "[search: Placeholder]"
      meaning: "Search input (distinct from plain input)"
      example: "[search: Filter ingredients...]"

  display:
    - symbol: "[grid: N cols]"
      meaning: "Data grid / table"
      example: "[grid: Name | Category | ABV | Actions]"

    - symbol: "[card: Title]"
      meaning: "Card component"
      example: "[card: Active Batches (12)]"

    - symbol: "[tabs: A | B | C]"
      meaning: "Tab group"
      example: "[tabs: Details | Recipe | History]"

    - symbol: "[chip: Label]"
      meaning: "Status chip or tag"
      example: "[chip: Active]  [chip: Draft]"

    - symbol: "[avatar: Name]"
      meaning: "User avatar"
      example: "[avatar: MH]"

    - symbol: "[icon: name]"
      meaning: "Icon button or display icon"
      example: "[icon: edit]  [icon: delete]  [icon: more]"

  layout:
    - symbol: "[breadcrumb: A > B > C]"
      meaning: "Breadcrumb navigation"
      example: "[breadcrumb: Home > Brands > IPA #4]"

    - symbol: "[toolbar: ...]"
      meaning: "Action toolbar"
      example: "[toolbar: [btn: Add] [search: Filter...] [select: Status в–ј]]"

    - symbol: "[empty: message]"
      meaning: "Empty state placeholder"
      example: "[empty: No batches yet. Create your first batch.]"

    - symbol: "[loading]"
      meaning: "Loading spinner/skeleton"

    - symbol: "(...)"
      meaning: "Content truncated for brevity"

