# ASCII Wireframe & Diagram Conventions
# Standard conventions for producing consistent ASCII UX diagrams across projects.
# Used by the UX modeling methodology for navigation, page wireframes, and IA diagrams.
# Last updated: 2026-03-04

id: ascii-conventions
name: "ASCII Wireframe Conventions"
description: >
  Reusable conventions for drawing UX diagrams in ASCII. Designed for inline
  markdown display, git versioning, and fast iteration. These are low-fidelity
  by design вҖ” they show structure and arrangement, not styling or pixel detail.
spec_relevant: false
project_applicability:
  relevant_when: "Always relevant вҖ” used for spec wireframes and architecture diagrams"
  action_if_irrelevant: keep

