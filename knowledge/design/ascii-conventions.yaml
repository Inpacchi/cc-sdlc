# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Usage Guidelines
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

guidelines:
  - "Show structure, not styling вҖ” no colors, exact fonts, or pixel measurements"
  - "Label by purpose and content, not by implementation detail"
  - "Always show surrounding context вҖ” don't wireframe a component in isolation"
  - "Use (1), (2), (3) callouts for design decisions that need explanation"
  - "When showing modifications, use вҳ…/вң•/~ markers to distinguish new/removed/changed"
  - "Keep proportions roughly representative but don't obsess over exact widths"
  - "Use monospace font assumption вҖ” all characters are equal width"
  - "Wrap at ~70-80 characters to fit in markdown and terminal views"
