# Token Economics as Architectural Constraint
# How context window size and token budgets constrain AI-assisted workflows.
# Promoted from disciplines/architecture.md parking lot.
# Last updated: 2026-03-22

id: token-economics
name: "Token Economics as Architectural Constraint"
description: "How context window size and token budgets constrain knowledge retrieval, agent dispatch, and codebase refactoring in AI-assisted workflows"
pattern: entries
category: architecture
spec_relevant: false
project_applicability:
  relevant_when: "Always relevant — governs the cc-sdlc agent system itself"
  action_if_irrelevant: keep
last_updated: 2026-03-22

# ─────────────────────────────────────────────
# Core Principle
# ─────────────────────────────────────────────

principle: >
  Token budgets constrain the amount of context an agent can hold simultaneously.
  This affects: how many knowledge files an agent can consult, how large a codebase
  change can be reviewed in a single pass, and how many steps a workflow can
  accumulate before context degrades. Architecture should design for these limits
  rather than fighting them.

# ─────────────────────────────────────────────
# Constraint Dimensions
# ─────────────────────────────────────────────

constraint_dimensions:
  knowledge_retrieval:
    constraint: "Each agent dispatch can load a limited number of knowledge files before context fills"
    implication: >
      Knowledge files should be focused and modular — one topic per file, not monolithic
      reference documents. The agent-context-map must be precise (map only what's relevant)
      rather than comprehensive (map everything that might be useful).
    design_rule: "Prefer many small files over few large ones. A 500-line YAML is harder to load selectively than five 100-line YAMLs."

  codebase_scope:
    constraint: "Large-scale refactors that touch dozens of files may exceed what an agent can hold in context"
    implication: >
      Architecture should favor designs that localize change. A refactor that touches
      3 files is feasible in one agent pass. A refactor that touches 30 files needs
      to be decomposed into phases, each scoped to fit in context.
    design_rule: "When planning a refactor, estimate the number of files touched. If > 10, decompose into independent phases that can be executed in separate agent sessions."

  workflow_accumulation:
    constraint: "Multi-step workflows accumulate context (previous step results, tool call history) that reduces available space for new work"
    implication: >
      Long workflows should checkpoint and summarize intermediate results rather than
      carrying full history. The Workflow DevKit's step isolation is the architectural
      answer — each step gets a fresh context with only the inputs it needs.
    design_rule: "Design workflow steps to be self-contained. Pass structured summaries between steps, not raw conversation history."

  review_depth:
    constraint: "Code review quality degrades when the diff exceeds context capacity"
    implication: >
      PRs should be scoped to fit in a single review pass. Monolithic PRs that change
      hundreds of lines across many files get shallower review — the reviewer runs out
      of context to track all the implications.
    design_rule: "Prefer smaller, focused PRs. If a change is large, split into stacked PRs with clear dependency order."

# ─────────────────────────────────────────────
# Practical Guidelines
# ─────────────────────────────────────────────

practical_guidelines:
  knowledge_file_sizing:
    target: "< 200 lines per YAML knowledge file"
    rationale: "Keeps individual file load cost manageable; allows loading 3-5 files per agent dispatch"

  agent_dispatch_budget:
    rule: "When dispatching an agent, estimate total context load: knowledge files + codebase reads + prompt + expected output"
    warning_threshold: "If estimated load exceeds 60% of context window, reduce knowledge files or split the task"

  refactor_decomposition:
    phases: "Identify → Plan → Execute phase-by-phase → Verify"
    key_insight: >
      The planning phase can see the whole picture (reading files is cheap).
      The execution phase should work on focused subsets (writing changes is expensive
      in context). Plan wide, execute narrow.

  knowledge_store_maintenance:
    implication: >
      Token economics is the architectural reason the two-tier knowledge architecture
      exists. Cross-project knowledge must be compact and high-signal because every
      byte competes for context space. Project-specific knowledge can be larger because
      it's loaded selectively by agents working in that project.

# ─────────────────────────────────────────────
# Session Degradation Patterns
# ─────────────────────────────────────────────
#
# Source: Chroma Research, "Context Rot" (trychroma.com/research/context-rot):
#   - Models perform BETTER on shuffled haystacks than logically structured ones
#   - Models differ in degradation behavior: some abstain when uncertain, others
#     hallucinate confident wrong answers — verify empirically for your target model
#   - Degradation starts above ~500 words for some tasks, intensifies with length
#   - Lower semantic similarity between query and target accelerates degradation
#   - Distractors have non-uniform impact — some cause far more degradation than others
# CS146S Wk 6: "Context Rot: Understanding Degradation in AI Context Windows."
#
# Context quality is not static — it degrades dynamically over a session
# as failed approaches, corrections, tool output, and exploration accumulate.
# Managing static token budgets (file sizes, knowledge loading) is necessary
# but not sufficient. Session hygiene addresses the dynamic problem.

session_degradation:
  principle: >
    LLM performance degrades as context fills — not just because capacity is
    exhausted, but because the signal-to-noise ratio drops. A context window
    full of failed approaches, corrections, and irrelevant file reads produces
    worse output than a fresh context with only the approved plan loaded.
    Counterintuitively, structured context can perform worse than shuffled
    context — models may over-attend to narrative coherence rather than
    extracting the specific information needed. Context engineering (deliberate
    construction and management of what enters the window) matters more than
    context size.

  model_behavior_under_degradation:
    principle: >
      Model families differ in how they fail under degraded context — some abstain
      when uncertain (producing incomplete but honest output), others hallucinate
      confident wrong answers. The specific behavior of any given model drifts as
      new versions ship; verify empirically rather than relying on stated behavior.
    implication: >
      For review tasks in long sessions, bias toward false negatives (missed
      issues) is safer than bias toward false positives (wrong findings that
      waste fix cycles). Configure review gates accordingly: prefer models that
      abstain over models that confabulate for correctness-critical work.

  degradation_signals:
    - signal: "Agent repeats a mistake that was already corrected"
      cause: "Trajectory poisoning — the conversation pattern has become 'error → correction → error'"
      response: "Clear context and restart with better initial guidance. Do not correct a third time."
    - signal: "Agent starts ignoring CLAUDE.md rules or plan constraints"
      cause: "Critical instructions pushed out of effective attention by accumulated context"
      response: "Compact or clear. If the session is long, the plan file may need to be re-read."
    - signal: "Agent proposes approaches that contradict earlier agreed-upon decisions"
      cause: "Earlier decisions have been compacted away or lost in noise"
      response: "Re-read the plan or spec file to restore the decision context."
    - signal: "Agent reads files it already read earlier in the session"
      cause: "Earlier reads compacted; context no longer contains the information"
      response: "This is normal after compaction but wastes tokens. Consider checkpointing and restarting."

  session_hygiene_rules:
    clear_between_phases: >
      Each SDLC phase (spec, plan, execute) should start with a fresh context.
      The plan file is the compaction artifact — it compresses all research and
      decisions into a document that a fresh context can act on immediately.
      Carrying planning context into execution wastes budget on information
      the agent no longer needs.
    subagent_for_exploration: >
      When investigating a question that requires reading many files (understanding
      how auth works, tracing a data flow, exploring test patterns), dispatch a
      subagent. The subagent explores in its own context and returns a summary.
      The main context stays clean for implementation. Exploration is the single
      largest source of context pollution.
    checkpoint_long_executions: >
      For sdlc-execute runs that span many implementation phases, checkpoint
      progress between phases. Each phase should start with only: the plan,
      the current phase's scope, and a summary of what prior phases produced.
      Do not carry full tool output history across phases.
    two_correction_limit: >
      If the agent makes the same category of mistake twice despite correction,
      the context trajectory is poisoned. Clear and restart with a better initial
      prompt that incorporates the lesson. A third correction in the same context
      will almost certainly fail because the conversation pattern itself has become
      the signal the model follows.
