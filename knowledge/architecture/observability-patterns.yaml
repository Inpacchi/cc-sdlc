# Observability Patterns
# Principles and patterns for instrumenting production systems so failures
# can be diagnosed without reproducing them locally.
# Last updated: 2026-04-21

id: observability-patterns
name: "Observability Patterns"
description: "What to instrument, how to instrument it, and what agents should look for when diagnosing production issues"
pattern: entries
category: architecture
spec_relevant: false
project_applicability:
  relevant_when: "Any system that runs in production and must be diagnosable after the fact"
  action_if_irrelevant: remove
last_updated: 2026-04-21

# ─────────────────────────────────────────────
# Core Principle — Three Pillars
# ─────────────────────────────────────────────

core_principle:
  rule: >
    Observability rests on three data types: logs (discrete events), metrics
    (numeric time series), and traces (request flow across services). Each answers
    a different question. A system missing any one of them has a blind spot.
  what_each_answers:
    logs: "What happened at this specific moment? (discrete, high-cardinality, expensive at scale)"
    metrics: "What's happening across the fleet over time? (aggregated, low-cardinality, cheap at scale)"
    traces: "Where did this request spend its time, and which service failed it?"
  anti_pattern: "Relying on any single pillar for all diagnostics. Logs without metrics miss trends; metrics without logs miss root causes; traces without either miss context."

# ─────────────────────────────────────────────
# What to Instrument
# ─────────────────────────────────────────────

golden_signals:
  description: >
    The "four golden signals" cover most operational questions. Every service
    should expose these at minimum.
  signals:
    - name: "Latency"
      what_to_measure: "Time to service a request. Track p50, p95, p99 separately — averages hide the tail."
      why_it_matters: "Tail latency drives user experience. Average latency can look healthy while p99 is catastrophic."
    - name: "Traffic"
      what_to_measure: "Requests per second (or queue depth for async systems)"
      why_it_matters: "Establishes the load context for every other signal."
    - name: "Errors"
      what_to_measure: "Error rate (absolute count and percentage). Distinguish user errors (4xx) from service errors (5xx)."
      why_it_matters: "User errors indicate a UX or API contract issue; service errors indicate an operational issue."
    - name: "Saturation"
      what_to_measure: "How full the service's bottleneck resource is (CPU, memory, connection pool, queue depth)"
      why_it_matters: "Saturation leads latency and errors — catching it first enables proactive scaling."

# ─────────────────────────────────────────────
# Logging Discipline
# ─────────────────────────────────────────────

logging_discipline:
  levels:
    error: "An operation failed and the user or system is affected. Must be actionable — include enough context to diagnose."
    warn: "Something unexpected but recoverable. The system continued but a human should review."
    info: "State transitions worth recording — start/end of significant operations, config changes, deployments."
    debug: "Detailed execution flow, disabled by default in production. Useful when debug is explicitly enabled for a session."
    trace: "Extremely verbose. Almost never enabled in production."

  what_every_log_line_needs:
    - "Timestamp (ISO 8601 with timezone)"
    - "Severity level"
    - "Service/component name"
    - "Correlation ID (trace ID or request ID) for cross-service stitching"
    - "User or tenant ID (if applicable)"
    - "Structured fields (key=value or JSON) — not just free-form prose"

  what_NOT_to_log:
    - "Passwords, API keys, tokens, session cookies"
    - "Full payment card numbers, SSNs, government IDs"
    - "Personal health information or regulated data without explicit redaction"
    - "Full request/response bodies by default — log schema, size, and key fields instead"
    - "Repetitive success cases at INFO — they flood logs and bury real signals"

  correlation_ids:
    principle: "Every inbound request should receive a correlation ID at the edge and propagate it through every downstream call."
    why: "Without correlation IDs, multi-service failures require manual timestamp matching across logs. With them, a single query returns the full request flow."
    headers: "Common conventions: X-Request-ID, X-Correlation-ID, W3C traceparent (baggage for custom fields)"

# ─────────────────────────────────────────────
# Metric Design
# ─────────────────────────────────────────────

metric_design:
  cardinality_rule:
    rule: "Keep label cardinality bounded. A metric with user_id as a label will have millions of time series."
    safe_labels: "Service name, endpoint, HTTP status, region, tenant_type (not tenant_id)"
    unsafe_labels: "User ID, request ID, trace ID, full URL path (any unbounded identifier)"

  histograms_over_averages:
    rule: "For latency and size distributions, record histograms not averages."
    why: "Histograms let you compute p50/p95/p99 after the fact. Averages cannot be meaningfully aggregated across hosts and time."

  rate_not_count:
    rule: "For most counters, track the rate (events per second) rather than the cumulative count."
    why: "Rates are comparable across time windows and scale. Raw counters require delta calculations."

# ─────────────────────────────────────────────
# Distributed Tracing
# ─────────────────────────────────────────────

distributed_tracing:
  when_to_invest:
    - "Request flows cross 3+ services"
    - "Debugging latency issues requires knowing which hop is slow"
    - "Dependencies between services aren't obvious from code"

  sampling_strategy:
    head_sampling: "Decide at request entry whether to trace. Simple but loses rare failures if they aren't sampled."
    tail_sampling: "Buffer the full trace, decide at end (after seeing errors or latency). Catches rare failures at cost of memory."
    recommendation: "Start with head sampling at 1-10%. Move to tail sampling if you find tracing is missing the failures you need."

  span_attributes:
    include:
      - "Service name, operation name"
      - "Start/end timestamps (automatic)"
      - "Relevant IDs (tenant, business entity — with cardinality care)"
      - "Error info if the span failed"
      - "External call targets (URLs, DB table, queue name)"
    avoid:
      - "Full request bodies"
      - "PII"
      - "Large payloads — attach a size, not the payload"

# ─────────────────────────────────────────────
# What Agents Should Look For (Diagnosis Playbook)
# ─────────────────────────────────────────────

diagnosis_playbook:
  description: >
    When an agent is dispatched to diagnose a production issue, this is the
    rough order of investigation. Tailor to the specific system, but the
    sequence is usually: traffic → errors → latency → saturation → logs.
  steps:
    - step: "1. Establish the time window"
      what_to_look_for: "When did the issue start? Is it ongoing or resolved?"
      data: "User reports, alert timestamps, deploy timeline"

    - step: "2. Check error rates"
      what_to_look_for: "Did error rate spike? On which endpoint/service? 4xx (client) or 5xx (server)?"
      data: "Error count and error percentage metrics, segmented by endpoint and status code"

    - step: "3. Check latency"
      what_to_look_for: "Did p95/p99 latency spike? On which endpoint? Which downstream hop?"
      data: "Latency histograms per endpoint, trace data for slow requests"

    - step: "4. Check saturation"
      what_to_look_for: "Is any bottleneck resource saturated? CPU, memory, connection pool, queue depth?"
      data: "Resource metrics per host, queue depth metrics, connection pool utilization"

    - step: "5. Check deployments and config changes"
      what_to_look_for: "Did anything deploy or change near the issue start time?"
      data: "Deployment log, config change audit, feature flag flips"

    - step: "6. Sample specific failures in logs"
      what_to_look_for: "Pick 3-5 failed requests by correlation ID. Read the full flow across services."
      data: "Logs filtered by correlation ID and time range"

    - step: "7. Correlate with upstream dependencies"
      what_to_look_for: "Is the issue caused by a downstream dependency (DB, cache, third-party API)?"
      data: "Dependency metrics, third-party status pages"

# ─────────────────────────────────────────────
# Anti-Patterns
# ─────────────────────────────────────────────

anti_patterns:
  - pattern: "Logging everything at INFO"
    why_bad: "INFO becomes noise; real signals drown. Storage cost balloons."
    instead: "Use log levels meaningfully. Most success cases belong at DEBUG or not logged at all."

  - pattern: "Unbounded label cardinality in metrics"
    why_bad: "Kills the time series database. One bad metric can take down the monitoring system."
    instead: "Bound cardinality at metric design time. Use logs (high cardinality, queryable) for per-user insight."

  - pattern: "Dashboards without alerts"
    why_bad: "Issues are only caught when someone happens to look."
    instead: "For any signal worth dashboarding, define what 'bad' looks like and alert on it."

  - pattern: "Alerts without runbooks"
    why_bad: "On-call engineer gets paged, doesn't know what to do, escalates. Defeats the alert's purpose."
    instead: "Every alert links to a runbook: what the alert means, how to verify, how to mitigate, when to escalate."

  - pattern: "Instrumenting at the end of a project"
    why_bad: "Retrofitting observability is expensive and often incomplete. The first production incident will find the gaps."
    instead: "Instrument while building. Every new service ships with golden signals and a correlation ID from day one."
